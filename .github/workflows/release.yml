name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Package binaries
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ./dist
          Copy-Item ./target/release/cloak.exe ./dist/cloak.exe
          Copy-Item ./target/release/cloak-tray.exe ./dist/cloak-tray.exe
          Copy-Item ./target/release/cloakey-installer.exe ./dist/cloakey-installer.exe
          Compress-Archive -Path ./dist/* -DestinationPath ./cloakey-windows-x64.zip

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloakey-windows-x64
          path: cloakey-windows-x64.zip

